spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/beta_demands?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

problem-ticket:
  metrics:
    accurate-from: 2026-03-15T00:00:00
